    <script>
      (function() {
        const root = document.documentElement;
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");

        function getItem(key) {
          try {
            return localStorage.getItem(key);
          } catch (error) {
            return null;
          }
        }

        function applyResolvedTheme(theme) {
          root.dataset.theme = theme;
          root.setAttribute("color-scheme", theme);
          root.style.colorScheme = theme;
        }

        let mode = getItem("mode");
        if (mode !== "light" && mode !== "dark" && mode !== "auto") {
          mode = "auto";
        }
        const theme = mode === "auto"
          ? (prefersDark.matches ? "dark" : "light")
          : mode;

        root.dataset.mode = mode;
        applyResolvedTheme(theme);
      })();
    </script>

      html[data-theme="light"], html[data-theme="light"] body,
      html[color-scheme="light"], html[color-scheme="light"] body {

      html[data-theme="dark"], html[data-theme="dark"] body,

    <link id="hljs-light-theme" rel="stylesheet" media="not all" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css" />
    <link id="hljs-dark-theme" rel="stylesheet" media="not all" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dark.min.css" />
    <script>
      const root = document.documentElement;
      const hlLight = document.getElementById("hljs-light-theme");
      const hlDark = document.getElementById("hljs-dark-theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");

      function changeHighlightJS(theme) {
        if (!hlLight || !hlDark) {
          return;
        }
        hlDark.media = theme === "dark" ? "all" : "not all";
        hlLight.media = theme === "dark" ? "not all" : "all";
      }

      function applyResolvedTheme(theme) {
        root.dataset.theme = theme;
        root.setAttribute("color-scheme", theme);
        root.style.colorScheme = theme;
        root.style.backgroundColor = theme === "dark" ? "#161212" : "#ffffff";
        if (document.body) {
          document.body.style.backgroundColor = theme === "dark" ? "#161212" : "#ffffff";
        }
        changeHighlightJS(theme);
      }

      function setTheme(mode) {
        if (mode !== "light" && mode !== "dark" && mode !== "auto") {
          mode = "auto";
        }
        const resolvedTheme = mode === "auto"
          ? (prefersDark.matches ? "dark" : "light")
          : mode;

        root.dataset.mode = mode;
        applyResolvedTheme(resolvedTheme);

        try {
          localStorage.setItem("mode", mode);
          localStorage.setItem("theme", resolvedTheme);
        } catch (error) {
          // Ignore storage errors (e.g. restricted contexts).
        }

        prefersDark.onchange = mode === "auto"
          ? () => applyResolvedTheme(prefersDark.matches ? "dark" : "light")
          : null;
      }

      function cycleMode() {
        const currentMode = root.dataset.mode || "auto";
        const modeList = prefersDark.matches
          ? ["auto", "light", "dark"]
          : ["auto", "dark", "light"];
        const currentPosition = modeList.indexOf(currentMode);
        const nextPosition = currentPosition === -1
          ? 0
          : (currentPosition + 1) % modeList.length;
        setTheme(modeList[nextPosition]);
      }

      // Sync once after head bootstrap and set listeners.
      setTheme(root.dataset.mode || "auto");
      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".theme-switch-button").forEach((el) => {
          el.addEventListener("click", cycleMode);
        });
      });
    </script>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title></title>
    <script>
      // Set theme before CSS loads to avoid a light-flash on dark mode.
      (function() {
        const root = document.documentElement;
        const themeQuery = window.matchMedia("(prefers-color-scheme: dark)");
        const themeBackground = {
          light: "#ffffff",
          dark: "#161212"
        };

        function applyTheme(theme) {
          root.setAttribute("color-scheme", theme);
          root.style.colorScheme = theme;
          root.style.backgroundColor = themeBackground[theme];
          if (document.body) {
            document.body.style.backgroundColor = themeBackground[theme];
          }
        }

        window.applyTheme = applyTheme;
        let savedTheme = null;
        try {
          savedTheme = localStorage.getItem("theme");
        } catch (error) {
          savedTheme = null;
        }
        const initialTheme = (savedTheme === "light" || savedTheme === "dark")
          ? savedTheme
          : (themeQuery.matches ? "dark" : "light");
        window.__initialTheme = initialTheme;
        applyTheme(initialTheme);
      })();
    </script>
    <style>
      html, body {
        background-color: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        html, body {
          background-color: #161212;
        }
      }
      html[color-scheme="light"], html[color-scheme="light"] body {
        background-color: #ffffff;
      }
      html[color-scheme="dark"], html[color-scheme="dark"] body {
        background-color: #161212;
      }
      html[color-scheme="light"] pre code {
        background-color: #f5f5f5;
      }
      html[color-scheme="dark"] pre code {
        background-color: #1f1f1f;
      }
    </style>
        <link rel="stylesheet" type="text/css" href="clang-doc-mustache.css"/>
        <script src="mustache-index.js"></script>
    <link id="hljs-light-theme" rel="stylesheet" media="not all" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css" />
    <link id="hljs-dark-theme" rel="stylesheet" media="not all" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dark.min.css" />
    <script>
      const root = document.documentElement;
      const hlLight = document.getElementById("hljs-light-theme");
      const hlDark = document.getElementById("hljs-dark-theme");
      const themeQuery = window.matchMedia("(prefers-color-scheme: dark)");

      function getSavedTheme() {
        try {
          return localStorage.getItem("theme");
        } catch (error) {
          return null;
        }
      }

      function getActiveTheme() {
        return root.getAttribute("color-scheme") === "dark" ? "dark" : "light";
      }

      function changeHighlightJS(theme) {
        if (!hlLight || !hlDark) {
          return;
        }
        hlDark.media = theme === "dark" ? "all" : "not all";
        hlLight.media = theme === "dark" ? "not all" : "all";
      }

      changeHighlightJS(window.__initialTheme || getActiveTheme());

      // Listen to system theme changes.
      // If the user manually toggles the theme, the theme won't change according
      // to system changes.
      themeQuery.addEventListener("change", (event) => {
        const savedTheme = getSavedTheme();
        if (savedTheme === "light" || savedTheme === "dark") {
          return;
        }
        const nextTheme = event.matches ? "dark" : "light";
        window.applyTheme(nextTheme);
        changeHighlightJS(nextTheme);
      });
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=routine" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
</head>

                <button id="themeToggle"><span class="material-symbols-rounded">routine</span></button>

        </nav>
        <script>
            themeToggle.onclick = () => {
              const currentTheme = root.getAttribute("color-scheme");
              const next = currentTheme === "dark" ? "light" : "dark";
              changeHighlightJS(next);
              window.applyTheme(next);
              try {
                localStorage.setItem("theme", next);
              } catch (error) {
                // Ignore storage errors (e.g. blocked storage in restricted contexts).
              }
            };
        </script>

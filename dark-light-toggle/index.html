<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title></title>
        <link rel="stylesheet" type="text/css" href="clang-doc-mustache.css"/>
        <script src="mustache-index.js"></script>
    <link id="hljs-light-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css" />
    <link id="hljs-dark-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dark.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=routine" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar__container">
                <div class="navbar__logo">
                    
                </div>
                <div class="navbar__menu">
                    <ul class="navbar__links">
                        <li class="navbar__item">
                            <a href="" class="navbar__link">Home</a>
                        </li>
                    </ul>
                    <button id="theme-toggle"><span class="material-symbols-outlined">routine</span></button>
                </div>
            </div>
        </nav>
        <script>
            const root = document.documentElement;
            const toggle = document.getElementById("theme-toggle");
            const hlLight = document.getElementById("hljs-light-theme");
            const hlDark = document.getElementById("hljs-dark-theme");

            function changeHighlightJS(theme) {
              if (theme === "dark") {
                hlDark.disabled = false; 
                hlLight.disabled = true;
              } else {
                hlDark.disabled = true;
                hlLight.disabled = false;
              }

            }

            // Listen to system theme changes.
            const themeQuery = window.matchMedia("(prefers-color-scheme: dark)");
            themeQuery.addEventListener("change", (event) => {
              if (savedTheme === null) {
                return;
              } else if (event.matches) {
                changeHighlightJS("dark");
              } else {
                changeHighlightJS("light");
              }
            });

              toggle.onclick = () => {
                const currentTheme = root.getAttribute("color-scheme");
                const next = currentTheme === "dark" ? "light" : "dark";
                changeHighlightJS(next);
                root.setAttribute("color-scheme", next);
                localStorage.setItem("theme", next);
              };

            document.addEventListener("DOMContentLoaded", () => {
              const savedTheme = localStorage.getItem("theme");
              const currentTheme = root.getAttribute("color-scheme");
              if (savedTheme !== null) {
                root.setAttribute("color-scheme", savedTheme);
                changeHighlightJS(savedTheme);
              } else {
                root.setAttribute("color-scheme", currentTheme);
                changeHighlightJS(currentTheme);
              }

            });
        </script>
    </header>
    <main>
        <div class="container">
            <div class="sidebar">
                <h2></h2>
                <ul>
                    <li>
                        <details open>
                            <summary class="sidebar-section">

                                <li class="sidebar-item-container">

                                </li>
                            </ul>
                        </details>
                    </li>
                </ul>
            </div>
            <div class="resizer" id="resizer"></div>
            <div class="content">
                <section id="Index" class="section-container">
                    <h2>Index</h2>
                    <div>
                        <a href="GlobalNamespace/index.html">
                            <pre><code id="0000000000000000000000000000000000000000" class="language-cpp code-clang-doc">namespace GlobalNamespace</code></pre>
                        </a>
                    </div>
                </section>
            </div>
        </div>
    </main>
</body>
</html>
